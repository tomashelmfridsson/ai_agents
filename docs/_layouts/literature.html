<!DOCTYPE html>
<html lang="sv">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ page.title | escape }}</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #eee4d5;
        --paper: rgba(255, 251, 245, 0.98);
        --ink: #1d140d;
        --muted: #463830;
        --accent: #8f3518;
        --line: rgba(29, 20, 13, 0.16);
        --shadow: 0 22px 64px rgba(50, 28, 8, 0.14);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: Georgia, "Times New Roman", serif;
        color: var(--ink);
        background:
          radial-gradient(circle at top left, rgba(212, 162, 87, 0.20), transparent 28%),
          radial-gradient(circle at bottom right, rgba(166, 69, 36, 0.12), transparent 26%),
          var(--bg);
      }

      main {
        width: min(980px, calc(100% - 32px));
        margin: 0 auto;
        padding: 44px 0 64px;
      }

      .masthead {
        margin-bottom: 24px;
      }

      .doc-nav {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin: 18px 0 0;
      }

      .doc-nav a {
        display: inline-flex;
        align-items: center;
        padding: 9px 14px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: rgba(255, 251, 245, 0.72);
        color: var(--ink);
        text-decoration: none;
        font-size: 0.94rem;
        font-weight: 700;
      }

      .doc-nav a:hover,
      .doc-nav a:focus-visible {
        border-color: rgba(143, 53, 24, 0.42);
        background: rgba(143, 53, 24, 0.08);
        color: var(--accent);
      }

      .eyebrow {
        margin: 0 0 10px;
        color: var(--accent);
        text-transform: uppercase;
        letter-spacing: 0.18em;
        font-size: 0.78rem;
        font-weight: 700;
      }

      h1 {
        margin: 0;
        font-size: clamp(2.4rem, 5vw, 4.4rem);
        line-height: 0.94;
      }

      .lede {
        max-width: 68ch;
        margin: 16px 0 0;
        color: var(--muted);
        line-height: 1.65;
        font-size: 1.04rem;
        font-weight: 500;
      }

      article {
        padding: 28px;
        border: 1px solid var(--line);
        border-radius: 24px;
        background: var(--paper);
        box-shadow: var(--shadow);
        backdrop-filter: blur(8px);
      }

      article > :first-child {
        margin-top: 0;
      }

      article h1,
      article h2,
      article h3,
      article h4 {
        line-height: 1.15;
      }

      article h2,
      article h3,
      article h4 {
        margin: 1.8em 0 0.65em;
      }

      p,
      li {
        font-size: 1.03rem;
        line-height: 1.72;
        color: var(--muted);
        font-weight: 500;
      }

      p {
        margin: 0 0 1em;
      }

      ul,
      ol {
        margin: 0 0 1.1em 1.3em;
        padding: 0;
      }

      code {
        font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
        font-size: 0.92em;
        background: rgba(32, 26, 22, 0.06);
        border-radius: 6px;
        padding: 0.08em 0.36em;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        margin: 1.4em 0;
        overflow: hidden;
        border-radius: 18px;
      }

      th,
      td {
        padding: 14px 16px;
        border: 1px solid var(--line);
        vertical-align: top;
        text-align: left;
      }

      th {
        background: rgba(143, 53, 24, 0.10);
        color: var(--ink);
      }

      a {
        color: var(--accent);
        font-weight: 700;
      }

      @media (max-width: 720px) {
        main {
          width: min(100% - 20px, 980px);
          padding-top: 24px;
        }

        article {
          padding: 18px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header class="masthead">
        <p class="eyebrow">Dokumentation</p>
        <nav class="doc-nav" aria-label="Dokumentsidor">
          <a href="/ai_agents/docs/project-brief/">Projektbrief</a>
          <a href="/ai_agents/docs/theoretical-background-and-central-concepts/">Teoretisk bakgrund och centrala begrepp</a>
          <a href="/ai_agents/docs/literature-study/">Litteraturstudie</a>
          <a href="/ai_agents/docs/ai-agents-poc-report/">AI Agents POC Rapport</a>
          <a href="/ai_agents/docs/ai-developing-guidelines/">AI Developing Guidelines</a>
          <a href="/ai_agents/docs/qa-agent-developing-requirements/">QA Agent Developing Requirements</a>
        </nav>
      </header>
      <article>
        {{ content }}
      </article>
    </main>
  </body>
</html>
